<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Investment Results</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
<div class="container py-5">
    <h2>Projection Results</h2>
    <div class="table-responsive">
        <table class="table table-bordered table-striped">
            <thead>
            <tr>
                <th>Duration</th><th>Min Projection</th><th>Max Projection</th><th>Min Profit</th><th>Max Profit</th><th>Min Tax</th><th>Max Tax</th><th>Min Fees</th><th>Max Fees</th>
            </tr>
            </thead>
            <tbody>
            <tr th:each="r : ${results}">
                <td th:text="${r.duration}"></td>
                <td th:text="${T(com.enomyfinances.util.CurrencyFormatter).formatGbp(r.minProjection)}"></td>
                <td th:text="${T(com.enomyfinances.util.CurrencyFormatter).formatGbp(r.maxProjection)}"></td>
                <td th:text="${T(com.enomyfinances.util.CurrencyFormatter).formatGbp(r.minProfit)}"></td>
                <td th:text="${T(com.enomyfinances.util.CurrencyFormatter).formatGbp(r.maxProfit)}"></td>
                <td th:text="${T(com.enomyfinances.util.CurrencyFormatter).formatGbp(r.minTax)}"></td>
                <td th:text="${T(com.enomyfinances.util.CurrencyFormatter).formatGbp(r.maxTax)}"></td>
                <td th:text="${T(com.enomyfinances.util.CurrencyFormatter).formatGbp(r.totalFeesMin)}"></td>
                <td th:text="${T(com.enomyfinances.util.CurrencyFormatter).formatGbp(r.totalFeesMax)}"></td>
            </tr>
            </tbody>
        </table>
    </div>
    <a class="btn btn-link" th:href="@{/investments}">New Projection</a>
</div>
</body>
</html>
