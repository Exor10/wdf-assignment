<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Register - Enomy-Finances</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
<div class="container py-5" style="max-width: 540px;">
    <h2 class="mb-3">Create Account</h2>
    <div th:if="${successMessage}" class="alert alert-success" th:text="${successMessage}"></div>
    <form th:object="${registrationRequest}" th:action="@{/register}" method="post" class="card card-body shadow-sm">
        <div class="mb-3">
            <label class="form-label">Username</label>
            <input th:field="*{username}" class="form-control">
            <small class="text-danger" th:errors="*{username}"></small>
        </div>
        <div class="mb-3">
            <label class="form-label">Email</label>
            <input th:field="*{email}" class="form-control">
            <small class="text-danger" th:errors="*{email}"></small>
        </div>
        <div class="mb-3">
            <label class="form-label">Password</label>
            <input type="password" th:field="*{password}" class="form-control">
            <small class="text-danger" th:errors="*{password}"></small>
        </div>
        <button class="btn btn-primary" type="submit">Register</button>
        <a class="btn btn-link" th:href="@{/login}">Back to login</a>
    </form>
</div>
</body>
</html>
