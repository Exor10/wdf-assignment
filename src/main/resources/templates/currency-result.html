<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Currency Result</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
<div class="container py-5" style="max-width: 700px;">
    <h2>Conversion Result</h2>
    <div class="card card-body">
        <p><strong>Rate:</strong> <span th:text="${result.rate}"></span></p>
        <p><strong>Converted:</strong> <span th:text="${result.converted}"></span></p>
        <p><strong>Fee:</strong> <span th:text="${result.fee}"></span></p>
        <p><strong>Final Amount:</strong> <span th:text="${result.finalAmount}"></span></p>
    </div>
    <a class="btn btn-link mt-3" th:href="@{/currency}">New Conversion</a>
</div>
</body>
</html>
