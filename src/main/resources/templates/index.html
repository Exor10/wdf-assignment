<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Enomy-Finances Dashboard</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>
<div class="container py-5">
    <h1 class="mb-3">Enomy-Finances Dashboard</h1>
    <p class="lead">Secure financial operations portal.</p>
    <div class="d-flex gap-2 flex-wrap">
        <a class="btn btn-primary" th:href="@{/currency}">Currency Conversion</a>
        <a class="btn btn-success" th:href="@{/investments}">Investment Projection</a>
        <form th:action="@{/logout}" method="post">
            <button class="btn btn-outline-danger" type="submit">Logout</button>
        </form>
    </div>
</div>
</body>
</html>
