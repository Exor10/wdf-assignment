<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Investment Projection</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
<div class="container py-5" style="max-width: 700px;">
    <h2>Investment Projection</h2>
    <form th:object="${request}" th:action="@{/investments/project}" method="post" class="card card-body">
        <div class="mb-3">
            <label>Investment Type</label>
            <select th:field="*{investmentType}" class="form-select">
                <option th:each="t : ${types}" th:value="${t}" th:text="${t}"></option>
            </select>
        </div>
        <div class="mb-3">
            <label>Principal Amount (GBP)</label>
            <input th:field="*{principal}" class="form-control">
            <small class="text-danger" th:errors="*{principal}"></small>
        </div>
        <button class="btn btn-success" type="submit">Project</button>
    </form>
</div>
</body>
</html>
