<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Currency Conversion</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
<div class="container py-5" style="max-width: 700px;">
    <h2>Currency Conversion</h2>
    <form th:object="${request}" th:action="@{/currency/convert}" method="post" class="card card-body">
        <div class="row g-3">
            <div class="col-md-4">
                <label>From</label>
                <select th:field="*{sourceCurrency}" class="form-select">
                    <option th:each="c : ${currencies}" th:value="${c}" th:text="${c}"></option>
                </select>
            </div>
            <div class="col-md-4">
                <label>To</label>
                <select th:field="*{targetCurrency}" class="form-select">
                    <option th:each="c : ${currencies}" th:value="${c}" th:text="${c}"></option>
                </select>
            </div>
            <div class="col-md-4">
                <label>Amount</label>
                <input th:field="*{amount}" class="form-control"/>
            </div>
        </div>
        <small class="text-danger" th:errors="*{amount}"></small>
        <button class="btn btn-primary mt-3" type="submit">Convert</button>
    </form>
</div>
</body>
</html>
