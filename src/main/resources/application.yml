server:
  port: 8080

spring:
  datasource:
    url: jdbc:mysql://${DB_HOST:localhost}:${DB_PORT:3306}/${DB_NAME:enomy_finances}
    username: ${DB_USERNAME:root}
    password: ${DB_PASSWORD:root}
    driver-class-name: com.mysql.cj.jdbc.Driver
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        format_sql: true
  thymeleaf:
    cache: false

logging:
  level:
    root: INFO
    com.enomyfinances: INFO
    org.springframework.security: INFO

app:
  currency:
    transaction-fee-rate: 0.015
  exchange-rate:
    api-url: https://v6.exchangerate-api.com/v6/${EXCHANGE_API_KEY:demo}/latest/
    cache-ttl-seconds: 600
